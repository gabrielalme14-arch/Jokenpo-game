<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jokenpô - Pedra, Papel e Tesoura</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000' rx='10'/%3E%3Ctext x='50' y='70' font-family='Segoe Script,cursive' font-size='32' font-weight='bold' text-anchor='middle' fill='white'%3EJKP%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Jokenpô</h1>
            <p class="subtitle">Pedra, Papel e Tesoura - Desafie o Computador!</p>
        </header>

        <!-- Placares -->
        <div class="scoreboard">
            <div class="score-item">
                <div class="score-label">Você</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Empates</div>
                <div class="score-value" id="drawScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Computador</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <!-- Escolhas do jogador -->
        <div class="choices" id="choicesContainer">
            <div class="choice" data-choice="pedra" role="button" tabindex="0" aria-pressed="false">
                <div class="choice-icon">✊</div>
                <div class="choice-name">Pedra</div>
            </div>
            <div class="choice" data-choice="papel" role="button" tabindex="0" aria-pressed="false">
                <div class="choice-icon">📄</div>
                <div class="choice-name">Papel</div>
            </div>
            <div class="choice" data-choice="tesoura" role="button" tabindex="0" aria-pressed="false">
                <div class="choice-icon">✂️</div>
                <div class="choice-name">Tesoura</div>
            </div>
        </div>

        <!-- Área da batalha -->
        <div class="battle-area hidden" id="battleArea">
            <div class="battle-side">
                <div class="battle-label">Você</div>
                <div class="battle-icon" id="playerChoice"></div>
            </div>
            <div class="vs">VS</div>
            <div class="battle-side">
                <div class="battle-label">Computador</div>
                <div class="battle-icon" id="computerChoice"></div>
            </div>
        </div>

        <!-- Resultado -->
        <div class="result">
            <div class="result-text" id="resultText">Escolha sua jogada!</div>
            <div class="result-message" id="resultMessage">Pedra ganha de Tesoura • Papel ganha de Pedra • Tesoura ganha de Papel</div>
            <div id="streakMessage"></div>
        </div>

        <button class="reset-btn" id="resetBtn">🔄 Reiniciar Jogo</button>
        <a href="codigo.html" class="code-btn">📄 Ver Código-Fonte</a>

        <!-- Link para os códigos -->
<div style="text-align:center; margin-top:20px;">
    <a href="codigo.html" style="color:#2c3e50; font-weight:bold; text-decoration:none;">
        📄 Ver códigos do projeto
    </a>
</div>
    
</div>


    <!-- Script externo -->
    <script src="script.js"></script>
</body>
</html>
